# ============================================================
# nginx.conf — Configuració per servir la SPA de Deduction Duel
# ============================================================
# Punts clau:
#   - Totes les rutes no-fitxer redirigeixen a /index.html (SPA)
#   - Cache agressiva per assets amb hash (JS, CSS, imatges)
#   - Compressió gzip activada
#   - Capçaleres de seguretat bàsiques
# ============================================================

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Compressió gzip ---
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Capçaleres de seguretat ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Assets amb hash (cache llarga) ---
    # Vite genera noms com: assets/index-abc123.js
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- SPA fallback ---
    # Qualsevol ruta que no sigui un fitxer real → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- No servir fitxers ocults ---
    location ~ /\. {
        deny all;
    }
}
