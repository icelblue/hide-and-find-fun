name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instal·lar dependències
        run: npm ci

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Lint (bloqueja errors; sostre de warnings per no créixer)
        run: npx eslint . --max-warnings 20

      - name: Tests unitaris
        run: npm test

      - name: Build de producció
        run: npm run build
